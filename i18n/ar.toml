[homepage]
heroTitle = "مرحباً بكم في الإنترنت الخفي"
heroDescription = "I2P (مشروع الإنترنت غير المرئي) هو شبكة لامركزية تركز على الخصوصية تسمح للأشخاص بالتواصل وتبادل المعلومات بشكل مجهول. تعمل عن طريق توجيه البيانات من خلال طبقات مشفرة متعددة عبر عقد يديرها متطوعون، مما يخفي مواقع المرسل والمستقبل. والنتيجة هي شبكة آمنة ومقاومة للرقابة مصممة للمواقع الخاصة والرسائل ومشاركة البيانات."
