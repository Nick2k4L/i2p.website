[homepage]
heroTitle = "Vítejte na Neviditelném Internetu"
heroDescription = "I2P (Invisible Internet Project) je decentralizovaná síť zaměřená na ochranu soukromí, která umožňuje lidem komunikovat a sdílet informace anonymně. Funguje tím, že směruje data přes několik vrstev šifrování napříč uzly provozovanými dobrovolníky, čímž skrývá jak polohu odesílatele, tak příjemce. Výsledkem je bezpečná síť odolná vůči cenzuře navržená pro soukromé webové stránky, zasílání zpráv a sdílení dat."
