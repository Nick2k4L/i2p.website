<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="sShadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="dangerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <linearGradient id="safeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="12" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#24292f">Security Checklist for I2P Mirrors</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#656d76">Avoid these common mistakes that can compromise privacy</text>

  <!-- DO column -->
  <g transform="translate(30, 65)">
    <rect width="410" height="220" rx="10" fill="url(#safeBg)" stroke="#66bb6a" stroke-width="1.5" filter="url(#sShadow)"/>
    <text x="205" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">✅ DO</text>
    <line x1="20" y1="35" x2="390" y2="35" stroke="#a5d6a7" stroke-width="1"/>

    <text x="20" y="58" font-size="11" fill="#1b5e20">🔒 Bind services to localhost (127.0.0.1) only</text>
    <text x="20" y="80" font-size="11" fill="#1b5e20">🧹 Strip server headers (Server, X-Powered-By)</text>
    <text x="20" y="102" font-size="11" fill="#1b5e20">📦 Self-host all CSS, JS, fonts, and images</text>
    <text x="20" y="124" font-size="11" fill="#1b5e20">⏱️ Set aggressive cache headers (assets = 30d)</text>
    <text x="20" y="146" font-size="11" fill="#1b5e20">🛡️ Add Content Security Policy (default-src 'self')</text>
    <text x="20" y="168" font-size="11" fill="#1b5e20">💾 Back up your tunnel private keys (.dat files)</text>
    <text x="20" y="190" font-size="11" fill="#1b5e20">📏 Use gzip compression to reduce payload sizes</text>
    <text x="20" y="212" font-size="11" fill="#1b5e20">🕐 Set extended timeouts (60s+ connect, 120s+ read)</text>
  </g>

  <!-- DON'T column -->
  <g transform="translate(460, 65)">
    <rect width="410" height="220" rx="10" fill="url(#dangerBg)" stroke="#ef5350" stroke-width="1.5" filter="url(#sShadow)"/>
    <text x="205" y="25" text-anchor="middle" font-size="15" font-weight="700" fill="#c62828">❌ DON'T</text>
    <line x1="20" y1="35" x2="390" y2="35" stroke="#ef9a9a" stroke-width="1"/>

    <text x="20" y="58" font-size="11" fill="#b71c1c">⛔ Load resources from CDNs or external domains</text>
    <text x="20" y="80" font-size="11" fill="#b71c1c">⛔ Include HSTS headers (breaks I2P access!)</text>
    <text x="20" y="102" font-size="11" fill="#b71c1c">⛔ Forward X-Forwarded-For or X-Real-IP headers</text>
    <text x="20" y="124" font-size="11" fill="#b71c1c">⛔ Use Google Fonts, analytics, or tracking scripts</text>
    <text x="20" y="146" font-size="11" fill="#b71c1c">⛔ Expose database ports through I2P tunnels</text>
    <text x="20" y="168" font-size="11" fill="#b71c1c">⛔ Include server version info in responses</text>
    <text x="20" y="190" font-size="11" fill="#b71c1c">⛔ Forget to test with the I2P browser proxy</text>
    <text x="20" y="212" font-size="11" fill="#b71c1c">⛔ Use default timeouts (they'll cause failures)</text>
  </g>
</svg>
