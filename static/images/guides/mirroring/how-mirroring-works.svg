<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="clearnetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d0e8f7"/>
    </linearGradient>
    <linearGradient id="i2pGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#fafbfc" stroke="#e1e4e8" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#24292f">How I2P Mirroring Works</text>

  <!-- Clearnet side (top) -->
  <rect x="30" y="55" width="840" height="120" rx="10" fill="url(#clearnetGrad)" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="78" font-size="13" font-weight="600" fill="#1565c0">🌐 Regular Internet (Clearnet)</text>

  <!-- Regular user -->
  <g transform="translate(100, 115)">
    <circle cx="0" cy="-12" r="14" fill="#42a5f5" opacity="0.2"/>
    <text x="0" y="-8" text-anchor="middle" font-size="18">👤</text>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#1565c0">Regular User</text>
    <text x="0" y="36" text-anchor="middle" font-size="9" fill="#5c6bc0" font-style="italic">IP visible</text>
  </g>

  <!-- Arrow clearnet -->
  <line x1="145" y1="96" x2="310" y2="96" stroke="#42a5f5" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="310,96 300,90 300,102" fill="#42a5f5"/>
  <text x="228" y="88" text-anchor="middle" font-size="10" fill="#1976d2">direct connection</text>

  <!-- Your server (center) -->
  <rect x="320" y="60" width="260" height="105" rx="10" fill="url(#serverGrad)" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">🖥️ Your Server</text>
  <text x="450" y="104" text-anchor="middle" font-size="11" fill="#bf360c">i2p.net</text>

  <!-- Server internals -->
  <rect x="340" y="114" width="100" height="36" rx="5" fill="white" stroke="#ffcc80" stroke-width="1"/>
  <text x="390" y="136" text-anchor="middle" font-size="10" fill="#e65100">Web Server</text>
  <text x="390" y="146" text-anchor="middle" font-size="9" fill="#ff8f00">port 80/443</text>

  <rect x="460" y="114" width="100" height="36" rx="5" fill="white" stroke="#a5d6a7" stroke-width="1"/>
  <text x="510" y="136" text-anchor="middle" font-size="10" fill="#2e7d32">I2P Router</text>
  <text x="510" y="146" text-anchor="middle" font-size="9" fill="#388e3c">port 7657</text>

  <!-- Website on clearnet -->
  <g transform="translate(750, 105)">
    <rect x="-45" y="-30" width="90" height="55" rx="6" fill="white" stroke="#90caf9" stroke-width="1"/>
    <text x="0" y="-10" text-anchor="middle" font-size="10" fill="#1565c0">i2p.net</text>
    <text x="0" y="15" text-anchor="middle" font-size="18">🌍</text>
  </g>

  <!-- Arrow from server to website -->
  <line x1="580" y1="96" x2="700" y2="96" stroke="#42a5f5" stroke-width="2"/>
  <polygon points="700,96 690,90 690,102" fill="#42a5f5"/>
  <text x="640" y="88" text-anchor="middle" font-size="10" fill="#1976d2">serves</text>

  <!-- I2P side (bottom) -->
  <rect x="30" y="200" width="840" height="190" rx="10" fill="url(#i2pGrad)" stroke="#81c784" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="224" font-size="13" font-weight="600" fill="#2e7d32">🔒 I2P Network (Private &amp; Encrypted)</text>

  <!-- I2P User -->
  <g transform="translate(100, 300)">
    <circle cx="0" cy="-12" r="14" fill="#66bb6a" opacity="0.2"/>
    <text x="0" y="-8" text-anchor="middle" font-size="18">👤</text>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#2e7d32">I2P User</text>
    <text x="0" y="36" text-anchor="middle" font-size="9" fill="#43a047" font-style="italic">IP hidden</text>
  </g>

  <!-- Encrypted hops -->
  <g transform="translate(220, 280)">
    <circle cx="0" cy="0" r="18" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#1b5e20">🔐</text>
    <text x="0" y="28" text-anchor="middle" font-size="8" fill="#2e7d32">Hop 1</text>
  </g>
  <g transform="translate(310, 310)">
    <circle cx="0" cy="0" r="18" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#1b5e20">🔐</text>
    <text x="0" y="28" text-anchor="middle" font-size="8" fill="#2e7d32">Hop 2</text>
  </g>
  <g transform="translate(400, 280)">
    <circle cx="0" cy="0" r="18" fill="#a5d6a7" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="10" fill="#1b5e20">🔐</text>
    <text x="0" y="28" text-anchor="middle" font-size="8" fill="#2e7d32">Hop 3</text>
  </g>

  <!-- Encrypted path lines -->
  <line x1="130" y1="290" x2="200" y2="282" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="238" y1="280" x2="290" y2="305" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="328" y1="310" x2="380" y2="285" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- I2P tunnel to server -->
  <rect x="470" y="246" width="120" height="50" rx="8" fill="white" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="530" y="268" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">Server Tunnel</text>
  <text x="530" y="282" text-anchor="middle" font-size="9" fill="#388e3c">→ localhost:8080</text>

  <line x1="418" y1="278" x2="468" y2="270" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="468,270 458,266 460,276" fill="#66bb6a"/>

  <!-- Tunnel up to server -->
  <line x1="530" y1="246" x2="510" y2="165" stroke="#43a047" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="510,165 504,177 516,177" fill="#43a047"/>
  <text x="540" y="220" font-size="9" fill="#2e7d32" font-weight="600">tunnel connects</text>
  <text x="540" y="232" font-size="9" fill="#2e7d32" font-weight="600">to your server</text>

  <!-- I2P eepsite -->
  <g transform="translate(750, 300)">
    <rect x="-55" y="-32" width="110" height="60" rx="6" fill="white" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="0" y="-12" text-anchor="middle" font-size="10" fill="#2e7d32">i2p-projekt.i2p</text>
    <text x="0" y="10" text-anchor="middle" font-size="16">🔒🌍</text>
    <text x="0" y="22" text-anchor="middle" font-size="8" fill="#43a047">same content, private</text>
  </g>

  <!-- Arrow from tunnel to eepsite label -->
  <line x1="590" y1="275" x2="693" y2="290" stroke="#43a047" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="693,290 683,284 685,294" fill="#43a047"/>
  <text x="642" y="270" text-anchor="middle" font-size="9" fill="#2e7d32">accessible as</text>

  <!-- Key insight box -->
  <rect x="30" y="395" width="840" height="22" rx="4" fill="#f5f5f5"/>
  <text x="450" y="411" text-anchor="middle" font-size="11" fill="#616161">💡 Same server, same content — I2P just provides an additional private entrance for visitors</text>
</svg>
