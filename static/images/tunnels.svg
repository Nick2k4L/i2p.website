<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #6b7280; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .name { font-family: Arial, sans-serif; font-size: 13px; fill: #6b7280; text-anchor: middle; font-weight: bold; }
      .brace { fill: none; stroke: #6b7280; stroke-width: 3; }
      .arrow { fill: none; stroke: #9ca3af; stroke-width: 2; }
      .dashed-arrow { fill: none; stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 6,4; }
    </style>

    <!-- Computer/Monitor Icon -->
    <g id="computer">
      <!-- Monitor -->
      <rect x="-22" y="-30" width="44" height="32" rx="2" fill="#a8b4a0" stroke="#6b7280" stroke-width="1.5"/>
      <rect x="-18" y="-26" width="36" height="24" fill="#8b9a82" stroke="#6b7280" stroke-width="1"/>
      <!-- Monitor stand -->
      <rect x="-8" y="2" width="16" height="4" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
      <rect x="-14" y="6" width="28" height="4" rx="1" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
      <!-- Keyboard -->
      <rect x="-20" y="14" width="40" height="8" rx="1" fill="#9ca3af" stroke="#6b7280" stroke-width="1"/>
      <line x1="-16" y1="17" x2="16" y2="17" stroke="#6b7280" stroke-width="0.5"/>
      <line x1="-16" y1="19" x2="16" y2="19" stroke="#6b7280" stroke-width="0.5"/>
    </g>

    <!-- Server Icon -->
    <g id="server">
      <!-- Server tower -->
      <rect x="-18" y="-35" width="36" height="60" rx="2" fill="#a8b4a0" stroke="#6b7280" stroke-width="1.5"/>
      <!-- Drive bays -->
      <rect x="-14" y="-30" width="28" height="8" fill="#9ca3af" stroke="#6b7280" stroke-width="0.5"/>
      <rect x="-14" y="-20" width="28" height="8" fill="#9ca3af" stroke="#6b7280" stroke-width="0.5"/>
      <rect x="-14" y="-10" width="28" height="8" fill="#9ca3af" stroke="#6b7280" stroke-width="0.5"/>
      <!-- Vents -->
      <line x1="-10" y1="5" x2="10" y2="5" stroke="#6b7280" stroke-width="1"/>
      <line x1="-10" y1="9" x2="10" y2="9" stroke="#6b7280" stroke-width="1"/>
      <line x1="-10" y1="13" x2="10" y2="13" stroke="#6b7280" stroke-width="1"/>
      <line x1="-10" y1="17" x2="10" y2="17" stroke="#6b7280" stroke-width="1"/>
      <!-- Power button -->
      <circle cx="0" cy="-26" r="2" fill="#68a868" stroke="#6b7280" stroke-width="0.5"/>
    </g>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- No background - transparent -->

  <!-- Outbound Tunnel Brace -->
  <path class="brace" d="M 60 50 Q 60 35, 80 35 L 200 35 Q 220 35, 220 25 Q 220 35, 240 35 L 360 35 Q 380 35, 380 50"/>

  <!-- Inbound Tunnel Brace -->
  <path class="brace" d="M 500 50 Q 500 35, 520 35 L 640 35 Q 660 35, 660 25 Q 660 35, 680 35 L 800 35 Q 820 35, 820 50"/>

  <!-- Tunnel Labels -->
  <text x="220" y="20" class="title">Outbound tunnel</text>
  <text x="660" y="20" class="title">Inbound tunnel</text>

  <!-- Outbound Tunnel Nodes -->
  <!-- Alice - Outbound Gateway -->
  <g transform="translate(90, 130)">
    <use href="#computer"/>
  </g>
  <text x="90" y="175" class="name">Alice</text>
  <text x="90" y="195" class="label">Outbound</text>
  <text x="90" y="208" class="label">Gateway</text>

  <!-- Outbound Participant -->
  <g transform="translate(220, 130)">
    <use href="#computer"/>
  </g>
  <text x="220" y="195" class="label">Outbound</text>
  <text x="220" y="208" class="label">Participant</text>

  <!-- Outbound Endpoint -->
  <g transform="translate(350, 130)">
    <use href="#computer"/>
  </g>
  <text x="350" y="195" class="label">Outbound</text>
  <text x="350" y="208" class="label">Endpoint</text>

  <!-- Inbound Tunnel Nodes -->
  <!-- Inbound Gateway -->
  <g transform="translate(530, 130)">
    <use href="#computer"/>
  </g>
  <text x="530" y="195" class="label">Inbound</text>
  <text x="530" y="208" class="label">Gateway</text>

  <!-- Inbound Participant -->
  <g transform="translate(660, 130)">
    <use href="#computer"/>
  </g>
  <text x="660" y="195" class="label">Inbound</text>
  <text x="660" y="208" class="label">Participant</text>

  <!-- Bob - Inbound Endpoint (Server) -->
  <g transform="translate(790, 125)">
    <use href="#server"/>
  </g>
  <text x="790" y="175" class="name">Bob</text>
  <text x="790" y="195" class="label">Inbound</text>
  <text x="790" y="208" class="label">Endpoint</text>

  <!-- Arrows - Outbound tunnel -->
  <line x1="118" y1="130" x2="190" y2="130" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="248" y1="130" x2="320" y2="130" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Dashed arrow between tunnels -->
  <line x1="378" y1="130" x2="500" y2="130" class="dashed-arrow" marker-end="url(#arrowhead)"/>

  <!-- Arrows - Inbound tunnel -->
  <line x1="558" y1="130" x2="630" y2="130" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="688" y1="130" x2="760" y2="130" class="arrow" marker-end="url(#arrowhead)"/>
</svg>
