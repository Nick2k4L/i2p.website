<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <style>
      .name { font-family: Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #94a3b8; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 11px; font-weight: 500; fill: #94a3b8; }
      .connect-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #94a3b8; text-anchor: middle; }
      .db-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #94a3b8; text-anchor: middle; }
      .arrow { fill: none; stroke: #94a3b8; stroke-width: 2; }
    </style>
    
    <!-- Client icon -->
    <linearGradient id="client-grad" x1="7.8" x2="23.1" y1="10.4" y2="33.3" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5e5ff"/>
      <stop offset="1" stop-color="#acf"/>
    </linearGradient>
    <g id="client">
      <path fill="#999" d="M35.2 44.9l1 7.6h-8.4l1.1-7.6z"/>
      <path fill="gray" d="M60 46c0 1.3-1.1 2.4-2.4 2.4H6.4A2.4 2.4 0 014 46V10c0-1.3 1.1-2.4 2.4-2.4h51.2c1.3 0 2.4 1 2.4 2.4zM23 52.2h18a2 2 45 012 2v.2a2 2 135 01-2 2H23a2 2 45 01-2-2v-.2a2 2 135 012-2z"/>
      <circle cx="32" cy="44.8" r="1.3" fill="#ccc"/>
      <path fill="#87aade" d="M8.1 12v29.3h48V12z"/>
      <path fill="url(#client-grad)" d="M7.5 12.5v29l49-29z" transform="matrix(.98 0 0 1.01 .7 -.6)"/>
    </g>
    
    <!-- Database icon -->
    <linearGradient id="db-grad" x1="50%" x2="50%" y1="0%" y2="100%">
      <stop offset="0" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <g id="database">
      <ellipse cx="0" cy="40" rx="30" ry="8" fill="#4b5563"/>
      <rect x="-30" y="0" width="60" height="40" fill="url(#db-grad)"/>
      <ellipse cx="0" cy="0" rx="30" ry="8" fill="#9ca3af"/>
      <ellipse cx="0" cy="13" rx="30" ry="7" fill="none" stroke="#6b7280" stroke-width="1"/>
      <ellipse cx="0" cy="27" rx="30" ry="7" fill="none" stroke="#6b7280" stroke-width="1"/>
    </g>
    
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <!-- Alice -->
  <g transform="translate(50, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="69" y="38" class="name">Alice</text>
  
  <!-- John -->
  <g transform="translate(150, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="169" y="38" class="name">John</text>
  
  <!-- Peter -->
  <g transform="translate(250, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="269" y="38" class="name">Peter</text>
  
  <!-- Cloë -->
  <g transform="translate(400, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="419" y="38" class="name">Cloë</text>
  
  <!-- Dan -->
  <g transform="translate(500, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="519" y="38" class="name">Dan</text>
  
  <!-- Bob -->
  <g transform="translate(600, 45) scale(0.6)">
    <use href="#client"/>
  </g>
  <text x="619" y="38" class="name">Bob</text>
  
  <!-- Arrow Alice to John -->
  <line x1="90" y1="75" x2="148" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow John to Peter -->
  <line x1="190" y1="75" x2="248" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- CONNECT tunnels label -->
  <text x="344" y="55" class="connect-label">CONNECT</text>
  <text x="344" y="68" class="connect-label">tunnels</text>
  
  <!-- Arrow Peter to Cloë -->
  <line x1="290" y1="75" x2="398" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow Cloë to Dan -->
  <line x1="440" y1="75" x2="498" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow Dan to Bob -->
  <line x1="540" y1="75" x2="598" y2="75" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Database -->
  <g transform="translate(200, 180)">
    <use href="#database"/>
  </g>
  <text x="200" y="245" class="db-label">Network database</text>
  
  <!-- Arrow down from Alice - GET leaseSet -->
  <line x1="71" y1="94" x2="169" y2="175" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="85" y="125" class="label" transform="rotate(39.5, 85, 125)">GET leaseSet</text>
  
  <!-- Arrow up to Alice - leaseSet to Bob -->
  <line x1="177" y1="166" x2="81" y2="86" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="118" y="103" class="label" transform="rotate(39.5, 118, 103)">leaseSet to Bob</text>
</svg>