<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 595">
  <style>
    .box { fill: none; stroke: #94a3b8; stroke-width: 2; }
    .box-header { fill: rgba(96, 165, 250, 0.15); stroke: #60a5fa; stroke-width: 2; }
    .box-options { fill: rgba(168, 85, 247, 0.15); stroke: #a855f7; stroke-width: 2; }
    .box-numk { fill: rgba(251, 191, 36, 0.15); stroke: #fbbf24; stroke-width: 2; }
    .box-keytype { fill: rgba(52, 211, 153, 0.15); stroke: #34d399; stroke-width: 2; }
    .box-enckey { fill: rgba(96, 165, 250, 0.15); stroke: #60a5fa; stroke-width: 2; }
    .box-num { fill: rgba(251, 191, 36, 0.15); stroke: #fbbf24; stroke-width: 2; }
    .box-lease { fill: rgba(244, 114, 182, 0.15); stroke: #f472b6; stroke-width: 2; }
    .box-sig { fill: rgba(248, 113, 113, 0.15); stroke: #f87171; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; }
    .label-header { fill: #60a5fa; }
    .label-options { fill: #a855f7; }
    .label-numk { fill: #fbbf24; }
    .label-keytype { fill: #34d399; }
    .label-enckey { fill: #60a5fa; }
    .label-num { fill: #fbbf24; }
    .label-lease { fill: #f472b6; }
    .label-sig { fill: #f87171; }
    .desc { font-family: Arial, sans-serif; font-size: 11px; fill: #94a3b8; }
    .field-name { font-family: monospace; font-size: 11px; font-weight: 600; }
    .field-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #64748b; }
    .connector { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 3,3; fill: none; }
  </style>

  <!-- Stacked boxes diagram -->
  <g transform="translate(20, 20)">
    <!-- ls2_header box -->
    <rect x="0" y="0" width="250" height="50" class="box-header" rx="4"/>
    <text x="125" y="30" text-anchor="middle" class="label label-header">ls2_header</text>

    <!-- options box -->
    <rect x="0" y="55" width="250" height="40" class="box-options" rx="4"/>
    <text x="125" y="80" text-anchor="middle" class="label label-options">options</text>

    <!-- numk + keytype0 + keylen0 row -->
    <rect x="0" y="100" width="50" height="35" class="box-numk" rx="4"/>
    <text x="25" y="122" text-anchor="middle" class="label label-numk">numk</text>

    <rect x="55" y="100" width="70" height="35" class="box-keytype" rx="4"/>
    <text x="90" y="122" text-anchor="middle" class="label label-keytype">keytype0</text>

    <rect x="130" y="100" width="60" height="35" class="box-keytype" rx="4"/>
    <text x="160" y="122" text-anchor="middle" class="label label-keytype">keylen0</text>

    <!-- encryption_key_0 box -->
    <rect x="0" y="140" width="250" height="50" class="box-enckey" rx="4"/>
    <text x="125" y="170" text-anchor="middle" class="label label-enckey">encryption_key_0</text>

    <!-- ... ellipsis -->
    <text x="125" y="205" text-anchor="middle" class="desc">...</text>

    <!-- keytypen + keylenn row -->
    <rect x="0" y="215" width="70" height="35" class="box-keytype" rx="4"/>
    <text x="35" y="237" text-anchor="middle" class="label label-keytype">keytype_n</text>

    <rect x="75" y="215" width="60" height="35" class="box-keytype" rx="4"/>
    <text x="105" y="237" text-anchor="middle" class="label label-keytype">keylen_n</text>

    <!-- encryption_key_n box -->
    <rect x="0" y="255" width="250" height="50" class="box-enckey" rx="4"/>
    <text x="125" y="285" text-anchor="middle" class="label label-enckey">encryption_key_n</text>

    <!-- num + Lease2 0 row -->
    <rect x="0" y="310" width="35" height="60" class="box-num" rx="4"/>
    <text x="17" y="345" text-anchor="middle" class="label label-num">num</text>

    <rect x="40" y="310" width="210" height="60" class="box-lease" rx="4"/>
    <text x="145" y="345" text-anchor="middle" class="label label-lease">Lease2 0</text>

    <!-- Lease2 (num-1) box -->
    <rect x="0" y="375" width="250" height="50" class="box-lease" rx="4"/>
    <text x="125" y="405" text-anchor="middle" class="label label-lease">Lease2 (num-1)</text>

    <!-- signature box -->
    <rect x="0" y="430" width="250" height="50" class="box-sig" rx="4"/>
    <text x="125" y="460" text-anchor="middle" class="label label-sig">signature</text>
  </g>

  <!-- Connectors and descriptions on right -->
  <g transform="translate(280, 20)">
    <!-- ls2_header description -->
    <line x1="0" y1="25" x2="15" y2="25" class="connector"/>
    <text x="20" y="22" class="label label-header">LeaseSet2Header</text>
    <text x="20" y="37" class="field-desc">Variable length</text>

    <!-- options description -->
    <line x1="0" y1="75" x2="15" y2="75" class="connector"/>
    <text x="20" y="72" class="label label-options">Mapping</text>
    <text x="20" y="87" class="field-desc">2+ bytes</text>

    <!-- numk description -->
    <line x1="0" y1="117" x2="15" y2="117" class="connector"/>
    <text x="20" y="114" class="label label-numk">Integer</text>
    <text x="20" y="129" class="field-desc">1 byte (1 to max TBD)</text>

    <!-- keytype/keylen description -->
    <text x="20" y="159" class="label label-keytype">keytype/keylen</text>
    <text x="20" y="174" class="field-desc">2 bytes each</text>

    <!-- encryption_key description -->
    <text x="20" y="204" class="label label-enckey">PublicKey</text>
    <text x="20" y="219" class="field-desc">keylen bytes each</text>

    <!-- num description -->
    <line x1="0" y1="340" x2="15" y2="340" class="connector"/>
    <text x="20" y="337" class="label label-num">Integer</text>
    <text x="20" y="352" class="field-desc">1 byte (0-16)</text>

    <!-- leases description -->
    <text x="20" y="382" class="label label-lease">Lease2[]</text>
    <text x="20" y="397" class="field-desc">num × 40 bytes each</text>

    <!-- signature description -->
    <line x1="0" y1="455" x2="15" y2="455" class="connector"/>
    <text x="20" y="452" class="label label-sig">Signature</text>
    <text x="20" y="467" class="field-desc">40+ bytes or as specified</text>
  </g>

  <!-- Field descriptions at bottom -->
  <g transform="translate(20, 505)">
    <rect x="0" y="0" width="85" height="20" class="box-header" rx="3"/>
    <text x="42" y="14" text-anchor="middle" class="field-name label-header">ls2_header</text>

    <rect x="95" y="0" width="70" height="20" class="box-options" rx="3"/>
    <text x="130" y="14" text-anchor="middle" class="field-name label-options">options</text>

    <rect x="175" y="0" width="50" height="20" class="box-numk" rx="3"/>
    <text x="200" y="14" text-anchor="middle" class="field-name label-numk">numk</text>

    <rect x="235" y="0" width="80" height="20" class="box-keytype" rx="3"/>
    <text x="275" y="14" text-anchor="middle" class="field-name label-keytype">keytype/len</text>

    <rect x="0" y="30" width="110" height="20" class="box-enckey" rx="3"/>
    <text x="55" y="44" text-anchor="middle" class="field-name label-enckey">encryption_key</text>

    <rect x="120" y="30" width="45" height="20" class="box-num" rx="3"/>
    <text x="142" y="44" text-anchor="middle" class="field-name label-num">num</text>

    <rect x="175" y="30" width="60" height="20" class="box-lease" rx="3"/>
    <text x="205" y="44" text-anchor="middle" class="field-name label-lease">leases</text>

    <rect x="245" y="30" width="75" height="20" class="box-sig" rx="3"/>
    <text x="282" y="44" text-anchor="middle" class="field-name label-sig">signature</text>
  </g>
</svg>
