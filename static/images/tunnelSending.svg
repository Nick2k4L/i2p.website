<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 140">
  <defs>
    <style>
      .name { font-family: Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #94a3b8; text-anchor: middle; }
      .hop-label { font-family: Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #94a3b8; text-anchor: middle; }
      .green-line { fill: none; stroke: #22c55e; stroke-width: 2; }
      .magenta-line { fill: none; stroke: #d946ef; stroke-width: 2; }
      .brown-line { fill: none; stroke: #b8860b; stroke-width: 2; }
    </style>
    
    <!-- Client icon -->
    <linearGradient id="client-grad" x1="7.8" x2="23.1" y1="10.4" y2="33.3" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d5e5ff"/>
      <stop offset="1" stop-color="#acf"/>
    </linearGradient>
    <g id="client">
      <path fill="#999" d="M35.2 44.9l1 7.6h-8.4l1.1-7.6z"/>
      <path fill="gray" d="M60 46c0 1.3-1.1 2.4-2.4 2.4H6.4A2.4 2.4 0 014 46V10c0-1.3 1.1-2.4 2.4-2.4h51.2c1.3 0 2.4 1 2.4 2.4zM23 52.2h18a2 2 45 012 2v.2a2 2 135 01-2 2H23a2 2 45 01-2-2v-.2a2 2 135 012-2z"/>
      <circle cx="32" cy="44.8" r="1.3" fill="#ccc"/>
      <path fill="#87aade" d="M8.1 12v29.3h48V12z"/>
      <path fill="url(#client-grad)" d="M7.5 12.5v29l49-29z" transform="matrix(.98 0 0 1.01 .7 -.6)"/>
    </g>
    
    <!-- Arrowheads -->
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-magenta" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d946ef"/>
    </marker>
  </defs>
  
  <!-- Alice -->
  <text x="47" y="20" class="name">Alice</text>
  <g transform="translate(33, 25) scale(0.45)">
    <use href="#client"/>
  </g>
  
  <!-- Vertical line from Alice down -->
  <line x1="47" y1="55" x2="47" y2="75" class="brown-line"/>
  
  <!-- Horizontal line connecting to B -->
  <line x1="47" y1="75" x2="118" y2="75" class="green-line" marker-end="url(#arrowhead-green)"/>
  
  <!-- B -->
  <g transform="translate(118, 50) scale(0.45)">
    <use href="#client"/>
  </g>
  <text x="132" y="100" class="hop-label">B</text>
  
  <!-- Arrow B to C -->
  <line x1="162" y1="75" x2="218" y2="75" class="green-line" marker-end="url(#arrowhead-green)"/>
  
  <!-- C -->
  <g transform="translate(218, 50) scale(0.45)">
    <use href="#client"/>
  </g>
  <text x="232" y="100" class="hop-label">C</text>
  
  <!-- Arrow C to D -->
  <line x1="262" y1="75" x2="318" y2="75" class="green-line" marker-end="url(#arrowhead-green)"/>
  
  <!-- D -->
  <g transform="translate(318, 50) scale(0.45)">
    <use href="#client"/>
  </g>
  <text x="332" y="100" class="hop-label">D</text>
  
  <!-- Arrow D to E -->
  <line x1="362" y1="75" x2="418" y2="75" class="magenta-line" marker-end="url(#arrowhead-magenta)"/>
  
  <!-- E -->
  <g transform="translate(418, 50) scale(0.45)">
    <use href="#client"/>
  </g>
  <text x="432" y="100" class="hop-label">E</text>
  
  <!-- Arrow E to F -->
  <line x1="462" y1="75" x2="518" y2="75" class="magenta-line" marker-end="url(#arrowhead-magenta)"/>
  
  <!-- F -->
  <g transform="translate(518, 50) scale(0.45)">
    <use href="#client"/>
  </g>
  <text x="532" y="100" class="hop-label">F</text>
  
  <!-- Arrow F to Bob connection -->
  <line x1="562" y1="75" x2="617" y2="75" class="magenta-line" marker-end="url(#arrowhead-magenta)"/>
  
  <!-- Vertical line up to Bob -->
  <line x1="617" y1="75" x2="617" y2="55" class="brown-line"/>
  
  <!-- Bob -->
  <text x="617" y="20" class="name">Bob</text>
  <g transform="translate(603, 25) scale(0.45)">
    <use href="#client"/>
  </g>
</svg>